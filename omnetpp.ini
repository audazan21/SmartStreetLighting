[General]
network = SmartLoRaNetwork
sim-time-limit = 1000s

*.numberOfNodes = 5
*.numberOfGateways = 1

# -------------------------------------------------
# NODE APPLICATION
# -------------------------------------------------

**.loRaNodes[*].numApps = 1
**.loRaNodes[*].app[0].typename = "StreetLightApp"

**.loRaNodes[*].app[0].telemetryBaseTime = 120s
**.loRaNodes[*].app[0].faultMeanTime = 600s
**.loRaNodes[*].app[0].minimumSendGap = 20s

# IMPORTANT LORA PARAMETERS
**.loRaNodes[*].app[0].initialLoRaTP = 14dBm
**.loRaNodes[*].app[0].initialLoRaCF = 868MHz
**.loRaNodes[*].app[0].initialLoRaSF = 7
**.loRaNodes[*].app[0].initialLoRaBW = 125kHz
**.loRaNodes[*].app[0].initialLoRaCR = 4
**.loRaNodes[*].app[0].initialUseHeader = true

# -------------------------------------------------
# TRAFFIC SETTINGS
# -------------------------------------------------

**.numberOfPacketsToSend = 0

**.timeToFirstPacket = exponential(1000s)
**.timeToNextPacket = exponential(1000s)

# -------------------------------------------------
# GATEWAY SETTINGS
# -------------------------------------------------

**.loRaGW[*].numUdpApps = 1

**.loRaGW[0].packetForwarder.localPort = 2000
**.loRaGW[0].packetForwarder.destPort = 1000
**.loRaGW[0].packetForwarder.destAddresses = "networkServer"
**.loRaGW[0].packetForwarder.indexNumber = 0

# VERY IMPORTANT
**.loRaGW[*].LoRaGWNic.radio.iAmGateway = true

# -------------------------------------------------
# NETWORK SERVER
# -------------------------------------------------

**.networkServer.numApps = 1
**.networkServer.app[0].typename = "SmartNetworkServerApp"

**.networkServer.app[0].localPort = 1000
**.networkServer.app[0].destAddresses = "loRaGW[0]"
**.networkServer.app[0].destPort = 2000
**.networkServer.app[0].adrMethod = "avg"

# -------------------------------------------------
# AREA SETTINGS
# -------------------------------------------------

**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMaxX = 1000m
**.constraintAreaMaxY = 1000m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m

# -------------------------------------------------
# NODE POSITIONS
# -------------------------------------------------

**.loRaNodes[*].**.initialX = uniform(300m, 400m)
**.loRaNodes[*].**.initialY = uniform(300m, 400m)
**.loRaNodes[*].**.initFromDisplayString = false

# -------------------------------------------------
# GATEWAY POSITION
# -------------------------------------------------

**.loRaGW[0].**.initialX = 350m
**.loRaGW[0].**.initialY = 350m
**.loRaGW[*].**.initFromDisplayString = false

# -------------------------------------------------
# LORA RADIO SETTINGS
# -------------------------------------------------

**.radio.radioMediumModule = "LoRaMedium"

**.LoRaMedium.pathLossType = "LoRaLogNormalShadowing"

**.energyDetection = -110dBm
**.minInterferenceTime = 0s
**.alohaChannelModel = false

# -------------------------------------------------
# RECORDING
# -------------------------------------------------

**.vector-recording = true

# -------------------------------------------------
# ENERGY SETTINGS
# -------------------------------------------------

**.loRaNodes[*].LoRaNic.radio.energyConsumer.typename = "LoRaEnergyConsumer"

**.loRaNodes[*].LoRaNic.radio.energyConsumer.energySourceModule = "^.IdealEpEnergyStorage"

**.energySourceModule = "^.IdealEpEnergyStorage"

**.loRaNodes[*].LoRaNic.radio.energyConsumer.configFile = xmldoc("../flora/simulations/energyConsumptionParameters.xml")

# -------------------------------------------------
# CLOUD DELAY
# -------------------------------------------------

**.internetCloud.ipv4Delayer.config = xmldoc("../flora/simulations/cloudDelays.xml")
**.ipv4Delayer.config = xmldoc("../flora/simulations/cloudDelays.xml")

# -------------------------------------------------
# MAX TX TIME
# -------------------------------------------------

**.maxTransmissionDuration = 200s

[Config NodeSweep]
description = "Node count sweep for smart street lighting"

*.numberOfNodes = ${N=5,20,50}
*.numberOfGateways = 1

repeat = 30
seed-set = ${repetition}

sim-time-limit = 1000s

**.loRaNodes[*].app[0].telemetryBaseTime = 120s
**.loRaNodes[*].app[0].faultMeanTime = 600s
**.loRaNodes[*].app[0].minimumSendGap = 20s




[Config HighLoad]
description = "High telemetry frequency scenario - increased channel load"

*.numberOfNodes = ${N=5,20,50}
*.numberOfGateways = 1

repeat = 30
seed-set = ${repetition}

sim-time-limit = 1000s

# Telemetry interval halved to create higher channel load
**.loRaNodes[*].app[0].telemetryBaseTime = 60s
**.loRaNodes[*].app[0].faultMeanTime = 600s
**.loRaNodes[*].app[0].minimumSendGap = 20s
